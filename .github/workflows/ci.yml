name: CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v3

    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'
        cache: 'npm'

    - name: Install All Dependencies
      run: npm run install-all

    - name: Build Frontend
      run: |
        cd frontend
        npm run build

    - name: Test Backend
      run: |
        cd backend
        npm test
